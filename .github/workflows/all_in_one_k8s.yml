on:
  workflow_call:
    inputs:
      app_name:
        type: string
        default: ''
        required: false
      namespace:
        type: string
        default: ''
        required: false
      docker_file:
        type: string
        default: 'deploy/docker/images/dev/Dockerfile'
        required: false
      helm_path:
        type: string
        default: './deploy/chart'
        required: false
      env_file:
        type: string
        default: '.env'
        required: false
      do_build:
        type: boolean
        default: true
        required: false
      do_build_push:
        type: boolean
        default: true
        required: false
      do_deploy:
        type: boolean
        default: true
        required: false
      cf_domains:
        type: string
        default: ''
        required: false        

    secrets:
      build_vars:
        required: false
      deploy_vars:
        required: false
      gh_token:
        required: false

jobs:
  setup:
    runs-on: apifornia-builder
    outputs:
      APP_NAME: ${{ steps.setup.outputs.APP_NAME }}
      NAMESPACE: ${{ steps.setup.outputs.NAMESPACE }}
      CALLER_REPO_NAME: ${{ steps.setup.outputs.CALLER_REPO_NAME }}
      DEPLOY_RUNNER: ${{ steps.setup.outputs.DEPLOY_RUNNER }}
      EXTRA_TAG: ${{ steps.setup.outputs.EXTRA_TAG }}
    steps:
      - id: setup
        name: Setup
        uses: apifornia/github-actions/setup-logic@main
        with:
          APP_NAME: ${{ inputs.APP_NAME }}
          NAMESPACE: ${{ inputs.NAMESPACE }}

  # BUILD
  build:
    runs-on: apifornia-builder
    if: "${{ inputs.do_build == true }}"
    outputs:
      TAGS: ${{ steps.meta.outputs.tags }}
      # SHA_TAG is the immutable per-commit tag used by deploy-k8s for
      # --set image=. Callers that previously consumed TAGS for a single
      # tag can switch to SHA_TAG; TAGS still carries both tags for cleanup.
      SHA_TAG: ${{ steps.sha-tag.outputs.tag }}
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Generate .env file
        run: echo "${{ secrets.build_vars }}" > ${{ inputs.env_file }}
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/apifornia/${{ needs.setup.outputs.APP_NAME }}
          # Publish both the immutable SHA tag (consumed by pr-stand.yml as
          # PR_REPO_IMAGE) and the mutable ENV tag (e.g. "dev") in a single
          # build — previously two independent docker/build-push-action runs
          # doubled the build wall-clock time for every service-affecting PR.
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=${{ needs.setup.outputs.EXTRA_TAG }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ inputs.docker_file }}
          push: ${{ inputs.do_build_push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            project=apifornia

      - name: Extract SHA tag
        id: sha-tag
        run: |
          SHA_TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep "${{ github.sha }}" | head -1)
          echo "tag=${SHA_TAG}" >> $GITHUB_OUTPUT
  # DEPLOY
  deploy-k8s:
    needs: [setup,build]
    runs-on: apifornia-builder
    if: "${{ inputs.do_deploy == true }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Namespace check
        run: |
          set +e
          NS_EXISTS=$(kubectl get ns ${{ needs.setup.outputs.CALLER_REPO_NAME }}) || true
          if [ "$NS_EXISTS" == "" ]; then
            chmod +x /actions-runner/kubectl
            kubectl create ns ${{ needs.setup.outputs.NAMESPACE }} --context apifornia-${{ needs.setup.outputs.EXTRA_TAG }}
            kubectl create secret docker-registry ghcr-io --docker-server="ghcr.io" --docker-username="github" --docker-password="${{ secrets.gh_token }}" -n ${{ needs.setup.outputs.NAMESPACE }} --context apifornia-${{ needs.setup.outputs.EXTRA_TAG }}
            echo "Namespace and pullsecret created"
          else
            kubectl delete secret ghcr-io -n ${{ needs.setup.outputs.NAMESPACE }} --context apifornia-${{ needs.setup.outputs.EXTRA_TAG }}
            kubectl create secret docker-registry ghcr-io --docker-server="ghcr.io" --docker-username="github" --docker-password="${{ secrets.gh_token }}" -n ${{ needs.setup.outputs.NAMESPACE }} --context apifornia-${{ needs.setup.outputs.EXTRA_TAG }}
            echo "Secret re-created"
          fi

      - name: Generate .env file
        run: |
          echo "${{ secrets.deploy_vars }}" > ${{ inputs.helm_path }}/secrets
          echo "APP_BUILD_DATE: \"$(date '+%Y%m%d%H%M')\"" >> ${{ inputs.helm_path }}/secrets

      - name: Helm install
        run: |
          export HELM_KUBECONTEXT=apifornia-${{ needs.setup.outputs.EXTRA_TAG }}
          helm upgrade "${{ needs.setup.outputs.APP_NAME }}" ${{ inputs.helm_path }} \
          -f ${{ inputs.helm_path }}/values-${{ needs.setup.outputs.EXTRA_TAG }}.yml \
          --install \
          --atomic \
          --namespace "${{ needs.setup.outputs.NAMESPACE }}" \
          --set image="${{ needs.build.outputs.SHA_TAG }}" \
          --set git_commit="${GITHUB_SHA}"

  # CLEANUP
  cleanup:
    runs-on: apifornia-builder
    needs: [setup,build,deploy-k8s]
    steps:
      - name: Cleanup
        run: |
          docker image rm -f ${{ needs.build.outputs.TAGS }} || true
          docker image rm -f ${{ needs.setup.outputs.EXTRA_TAG }} || true

